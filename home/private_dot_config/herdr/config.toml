onboarding = false

[theme]
name = "catppuccin"

[ui]
agent_panel_sort = "spaces"

[keys]
# Workspace picker (prefix+w) list navigation: arrows plus vim-style k/j.
navigate_workspace_up = ["up", "k"]
navigate_workspace_down = ["down", "j"]

# tmux-pain-control-style pane splits.
# split right — v (unshifted) + | (tmux, shifted)
split_vertical = ["prefix+v", "prefix+|"]
# split below — minus (unshifted) + " (tmux, shifted)
split_horizontal = ["prefix+minus", 'prefix+"']

# tmux rename muscle memory: prefix+, renames the tab (herdr default prefix+shift+t kept).
rename_tab = ["prefix+shift+t", "prefix+,"]

[ui.toast]
# Desktop popups when a background agent finishes or needs input (no sound).
delivery = "system"

[session]
# Resume agent conversations after a herdr server restart.
resume_agents_on_restore = true

[ui.sound]
# No herdr sounds — PAI/Pulse handles audio cues.
enabled = false
